# ──────────────────────────────────────────────────────────────
# Parity — Docker Compose
# Day-2 NetOps loop powered by Dynatrace MCP + Gemini (ADK) + pyATS.
# Built for the Google Cloud Rapid Agent Hackathon, Dynatrace track.
#
# All services use parity-* names and distinct ports/volumes so the
# stack can run alongside other docker-compose projects on the same
# host without collision.
# ──────────────────────────────────────────────────────────────

networks:
  net_core:
    external: true

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: parity-postgres
    restart: unless-stopped
    networks:
      - net_core
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parity}
      POSTGRES_USER: ${POSTGRES_USER:-parity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - parity-pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parity}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ───────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: parity-chromadb
    restart: unless-stopped
    networks:
      - net_core
    volumes:
      - parity-chromadata:/chroma/chroma
    ports:
      - "8102:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dynatrace MCP stub ─────────────────────────────────────
  # FastMCP Python service exposing list_problems / find_entity_by_name
  # / execute_dql with canned Davis-style payloads. Swap the URL in
  # backend's DT_MCP_URL env var (and disable this service) once you
  # have a real Dynatrace tenant + @dynatrace-oss/dynatrace-mcp-server.
  dynatrace-mcp:
    build:
      context: ./docker/dynatrace-mcp-stub
      dockerfile: Dockerfile
    container_name: parity-dt-mcp
    restart: unless-stopped
    networks:
      - net_core
    ports:
      - "8220:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Real Dynatrace MCP server ──────────────────────────────
  # @dynatrace-oss/dynatrace-mcp-server v1.8.5 in HTTP mode.
  # Talks to the live kea15603 tenant via DT_ENVIRONMENT +
  # DT_PLATFORM_TOKEN passed in from .env. The backend chooses
  # this one over the stub when DT_MCP_URL is repointed at it.
  dynatrace-mcp-real:
    build:
      context: ./docker/dynatrace-mcp-real
      dockerfile: Dockerfile
    container_name: parity-dt-mcp-real
    restart: unless-stopped
    networks:
      - net_core
    env_file:
      - .env
    environment:
      DT_MCP_DISABLE_TELEMETRY: "true"
    ports:
      - "8222:3000"

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: parity-backend
    restart: unless-stopped
    networks:
      - net_core
    ports:
      - "8210:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: parity-postgres
      POSTGRES_PORT: 5432
      CHROMADB_HOST: parity-chromadb
      CHROMADB_PORT: 8000
      DT_MCP_URL: http://parity-dt-mcp:8000/mcp
      DT_REAL_MCP_URL: http://parity-dt-mcp-real:3000/mcp
      # Vertex AI / Gemini config — values read by both google-genai
      # (via env vars) and our own settings module (via .env).
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-parity-dynatrace}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
    volumes:
      # Mount the host's gcloud config so Application Default Credentials
      # are available inside the container without baking a key. Run
      # `gcloud auth application-default login` on the host once and the
      # google-genai SDK picks the credentials up automatically.
      #
      # For Cloud Run deployment we swap this for a service account
      # attached to the Cloud Run service — no bind mount needed.
      - ${USERPROFILE}/AppData/Roaming/gcloud:/root/.config/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      dynatrace-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (React + nginx) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: parity-frontend
    restart: unless-stopped
    networks:
      - net_core
    ports:
      - "8211:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  parity-pgdata:
  parity-chromadata:
